apiVersion: 1
providers:
  - name: lab-validation
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/validation
      foldersFromFilesStructure: false
  - name: lab-feature-demos
    orgId: 1
    folder: "v12 Feature Demos"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/v12-feature-demos
      foldersFromFilesStructure: false
