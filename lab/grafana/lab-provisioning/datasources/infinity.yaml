apiVersion: 1
datasources:
  - name: Grafana API (Infinity)
    uid: grafana-api
    type: yesoreyeram-infinity-datasource
    access: proxy
    # localhost from within the Grafana container points at Grafana's own HTTP server.
    url: http://localhost:3000
    basicAuth: true
    basicAuthUser: admin
    withCredentials: false
    jsonData:
      auth_method: basicAuth
      global_queries: []
      allowedHosts:
        - http://localhost:3000
      tlsSkipVerify: true
      timeoutInSeconds: 30
    secureJsonData:
      basicAuthPassword: "admin"
