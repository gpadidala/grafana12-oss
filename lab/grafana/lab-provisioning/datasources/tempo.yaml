apiVersion: 1
datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tlsSkipVerify: true
      tracesToLogsV2:
        datasourceUid: loki
        tags: [{ key: service.name, value: service }]
      tracesToMetrics:
        datasourceUid: prom
        tags: [{ key: service.name, value: service }]
      serviceMap:
        datasourceUid: prom
      nodeGraph: { enabled: true }
      spanBar: { type: "Tag", tag: "http.status_code" }
      streamingEnabled:
        search: true
