apiVersion: 1
providers:
  - name: v12-demos
    orgId: 1
    folder: "Grafana 12 Feature Demos"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /usr/share/grafana-dashboards/v12-demos
      foldersFromFilesStructure: false
  - name: platform
    orgId: 1
    folder: "Platform"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /usr/share/grafana-dashboards/platform
      foldersFromFilesStructure: false
