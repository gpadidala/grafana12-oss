apiVersion: 1
groups:
  - orgId: 1
    name: grafana-platform-slos
    folder: Alerting
    interval: 1m
    rules:
      - uid: grafana-api-latency-slo
        title: Grafana API latency burn (5m)
        condition: A
        data:
          - refId: A
            datasourceUid: prom
            model:
              expr: |
                histogram_quantile(0.95, sum by (le) (rate(grafana_http_request_duration_seconds_bucket[5m]))) > 0.5
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels: { severity: warning, service: grafana }
        annotations:
          summary: Grafana API p95 latency > 500ms for 5 min
