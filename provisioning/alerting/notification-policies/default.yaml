apiVersion: 1
policies:
  - orgId: 1
    receiver: slack-oncall
    group_by: [grafana_folder, alertname, severity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: slack-oncall
        matchers: [severity = critical]
        continue: false
        repeat_interval: 30m
